[tasks.install]
description = "Install dotfiles using Dotbot"
run = "./install"

[tasks.link]
run = "./install --only clean create link stow"

[tasks."update:brew"]
run = "brew upgrade --quiet"

[tasks."update:mise"]
run = "mise upgrade --quiet"

[tasks."update:tldr"]
run = "tldr --update"

[tasks."update:nvim"]
run = "nvim --headless '+Lazy! sync' +MasonUpdate +TSUpdate +qa"

[tasks.update]
depends = ["update:*"]
